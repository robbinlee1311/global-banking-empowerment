<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Create Account | Global Banking Empowerment</title><link rel="stylesheet" href="assets/css/bank.css"></head>
<body><main class="auth"><section class="auth-visual"><a class="brand" href="index.html"><span class="logo">GBE</span><span>Global Banking Empowerment</span></a><div><p class="kicker" style="color:#bfe8dd">Customer onboarding</p><h1>Open your online banking profile.</h1><p style="color:#e7eef7">This static demo stores profile data locally in your browser so the dashboard can show a realistic customer flow.</p></div></section><section class="auth-panel"><div class="card auth-card"><h2>Create account</h2><div id="notice" class="notice"></div><div class="field"><label for="name">Full name</label><input id="name" autocomplete="name"></div><div class="field"><label for="email">Email</label><input id="email" type="email" autocomplete="email"></div><div class="field"><label for="phone">Phone</label><input id="phone" autocomplete="tel"></div><div class="field"><label for="password">Password</label><input id="password" type="password" autocomplete="new-password"></div><button class="btn primary" type="button" onclick="bank.register()">Create account</button><p style="margin-top:18px">Already enrolled? <a class="kicker" href="login.html">Sign in</a></p></div></section></main><script src="assets/js/user.js"></script></body>
</html>
