<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create account | Global Banking Empowerment</title>
  <link rel="stylesheet" href="assets/css/bank.css">
</head>
<body>

  <div id="notice" class="notice">
    <div class="notice-icon"></div>
    <div class="notice-content"><h4></h4><p></p></div>
  </div>

  <div class="auth-page">
    <div class="auth-visual">
      <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=1200&q=80" alt="Mobile banking">
      <div class="auth-visual-content">
        <h2>Join GBE</h2>
        <p>Open your account in under 5 minutes. No hidden fees, no minimum balance, full FDIC insurance.</p>
      </div>
    </div>
    <div class="auth-form">
      <div class="auth-form-inner">
        <h2>Create account</h2>
        <p>Get started with secure online banking.</p>
        <form onsubmit="return bank.createAccount(this)">
          <div class="form-group">
            <label>Full name</label>
            <input type="text" name="name" placeholder="Alexander Morgan" required>
          </div>
          <div class="form-group">
            <label>Email address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Min. 8 characters" required>
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:flex-start;gap:8px;font-size:0.85rem;color:var(--color-text-muted);font-weight:400;cursor:pointer;">
              <input type="checkbox" required style="width:auto;margin-top:3px;">
              I agree to the <a href="#" style="color:var(--color-accent-dark);text-decoration:none;">Terms of Service</a> and <a href="#" style="color:var(--color-accent-dark);text-decoration:none;">Privacy Policy</a>
            </label>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Create account</button>
        </form>
        <p style="text-align:center;margin-top:24px;font-size:0.9rem;">
          Already have an account? <a href="login.html" style="color:var(--color-accent-dark);text-decoration:none;font-weight:600;">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="assets/js/user.js"></script>
</body>
</html>
