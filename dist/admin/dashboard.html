<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Dashboard | GBE</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}body{background:#0f172a;color:#e2e8f0;min-height:100vh}
.topbar{background:#1e293b;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155}
.topbar h1{font-size:20px;color:#f8fafc}.topbar .nav{display:flex;gap:24px}.topbar .nav a{color:#94a3b8;text-decoration:none;font-size:14px}.topbar .nav a.active{color:#3b82f6}
.container{max-width:1200px;margin:0 auto;padding:32px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
.stat-card{background:#1e293b;border-radius:12px;padding:24px;border:1px solid #334155}.stat-card .number{font-size:28px;font-weight:700;color:#f8fafc}.stat-card .label{font-size:14px;color:#94a3b8}
.table-card{background:#1e293b;border-radius:12px;padding:24px;border:1px solid #334155}.table-card h3{font-size:15px;color:#f8fafc;margin-bottom:20px}
table{width:100%;border-collapse:collapse}th,td{padding:12px 16px;text-align:left;font-size:13px}th{background:#0f172a;color:#94a3b8;font-size:11px;text-transform:uppercase}
td{color:#e2e8f0;border-top:1px solid #334155}tr:hover td{background:#1e293b}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px}.badge-active{background:rgba(16,185,129,.15);color:#10b981}.badge-pending{background:rgba(245,158,11,.15);color:#f59e0b}.badge-suspended{background:rgba(239,68,68,.15);color:#ef4444}
.btn-sm{padding:6px 14px;border-radius:6px;border:none;font-size:13px;cursor:pointer;color:#fff;margin-right:4px}.btn-blue{background:#3b82f6}.btn-blue:hover{background:#2563eb}.btn-red{background:#ef4444}.btn-red:hover{background:#dc2626}.btn-green{background:#10b981}.btn-green:hover{background:#059669}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}.modal.show{display:flex}
.modal-content{background:#1e293b;border-radius:12px;padding:28px;width:450px;max-width:90%;border:1px solid #334155}
.modal-content h3{color:#f8fafc;margin-bottom:16px}.form-group{margin-bottom:14px}.form-group label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:10px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f8fafc;font-size:14px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}.btn-outline{background:transparent;color:#94a3b8;border:1px solid #475569}
.toast{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:1000;transform:translateX(150%);transition:.3s}.toast.show{transform:translateX(0)}.toast-s{background:#10b981}.toast-e{background:#ef4444}
</style></head><body>
<div class="topbar"><h1>Admin Dashboard</h1><div class="nav"><a href="dashboard.html" class="active">Dashboard</a><a href="approvals.html">Approvals</a><a href="transfers.html">Transfers</a><a href="customers.html">Customers</a><a href="rules.html">Rules</a></div><div><button class="btn-sm btn-outline" onclick="location.href='index.html'" style="background:transparent;color:#94a3b8;border:1px solid #475569">Sign Out</button></div></div>
<div class="container">
<div class="stats"><div class="stat-card"><div class="number" id="tc">4</div><div class="label">Total Customers</div></div><div class="stat-card"><div class="number" id="pc">1</div><div class="label">Pending KYC</div></div><div class="stat-card"><div class="number" id="tb">$93,270</div><div class="label">Top Balance</div></div><div class="stat-card"><div class="number" id="ta">$279K</div><div class="label">Total Assets</div></div></div>
<div class="table-card"><h3>Manage Customer Accounts <button class="btn-sm btn-green" onclick="openAdd()">+ Add Customer</button></h3>
<table><thead><tr><th>Customer</th><th>Accounts</th><th>Balance</th><th>Status</th><th>Risk</th><th>Actions</th></tr></thead><tbody id="ct"></tbody></table></div></div>
<div class="modal" id="em"><div class="modal-content"><h3 id="et">Edit Customer</h3><div class="form-group"><label>Name</label><input id="en" type="text"></div><div class="form-group"><label>Email</label><input id="ee" type="email"></div><div class="form-group"><label>Account Types</label><input id="ea" type="text"></div><div class="form-group"><label>Balance ($)</label><input id="eb" type="number"></div><div class="form-group"><label>Status</label><select id="es"><option value="active">Active</option><option value="pending">Pending KYC</option><option value="suspended">Suspended</option></select></div><div class="form-group"><label>Risk</label><select id="er"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div><div class="modal-actions"><button class="btn-sm btn-outline" onclick="closeEm()">Cancel</button><button class="btn-sm btn-blue" onclick="save()">Save</button></div></div></div>
<div class="modal" id="am"><div class="modal-content"><h3>Add Customer</h3><div class="form-group"><label>Name</label><input id="an" type="text" placeholder="Full name"></div><div class="form-group"><label>Email</label><input id="ae" type="email" placeholder="email@example.com"></div><div class="form-group"><label>Account Types</label><input id="aa" type="text" placeholder="Checking, Savings" value="Checking"></div><div class="form-group"><label>Balance ($)</label><input id="ab" type="number" value="0"></div><div class="form-group"><label>Status</label><select id="as"><option value="active">Active</option><option value="pending" selected>Pending KYC</option><option value="suspended">Suspended</option></select></div><div class="form-group"><label>Risk</label><select id="ar"><option value="low" selected>Low</option><option value="medium">Medium</option><option value="high">High</option></select></div><div class="modal-actions"><button class="btn-sm btn-outline" onclick="closeAm()">Cancel</button><button class="btn-sm btn-green" onclick="add()">Create</button></div></div></div>
<div class="toast" id="t"></div>
<script>
var D=[{id:1,n:'Robbin Lee',e:'robbin.lee@email.com',a:'3 (Checking, Savings, Investment)',at:'Checking, Savings, Investment',b:93270,s:'active',r:'low'},{id:2,n:'James Kim',e:'james.kim@email.com',a:'2 (Checking, Investment)',at:'Checking, Investment',b:128500,s:'active',r:'low'},{id:3,n:'Sarah Mitchell',e:'sarah.m@email.com',a:'2 (Checking, Savings)',at:'Checking, Savings',b:45120,s:'active',r:'low'},{id:4,n:'Elena Rodriguez',e:'elena.r@email.com',a:'1 (Checking)',at:'Checking',b:12340,s:'pending',r:'medium'}];
function g(k){try{return JSON.parse(localStorage.getItem('gbe_'+k))||D}catch{return D}}
function s(k,v){localStorage.setItem('gbe_'+k,JSON.stringify(v))}
var C=g('c'),E=null;
function render(){var a=C.filter(c=>c.s=='active').length,p=C.filter(c=>c.s=='pending').length,tb=C.reduce((x,c)=>x+c.b,0),tp=C.reduce((x,c)=>c.b>x?c.b:x,0);document.getElementById('tc').textContent=C.length;document.getElementById('pc').textContent=p;document.getElementById('tb').textContent='$'+tp.toLocaleString();document.getElementById('ta').textContent='$'+(tb/1000).toFixed(0)+'K';document.getElementById('ct').innerHTML=C.map(c=>{var sb=c.s=='active'?'badge-active':c.s=='pending'?'badge-pending':'badge-suspended',rb=c.r=='low'?'badge-active':c.r=='medium'?'badge-pending':'badge-suspended';return'<tr><td><b>'+c.n+'</b><br><span style="color:#64748b;font-size:12px">'+c.e+'</span></td><td>'+c.a+'</td><td>$'+c.b.toLocaleString()+'</td><td><span class="badge '+sb+'">'+c.s+'</span></td><td><span class="badge '+rb+'">'+c.r+'</span></td><td><button class="btn-sm btn-blue" onclick="edit('+c.id+')">Edit</button><button class="btn-sm btn-red" onclick="del('+c.id+')">Del</button></td></tr>'}).join('');s('c',C)}
function edit(id){var c=C.find(x=>x.id==id);if(!c)return;E=id;document.getElementById('et').textContent='Edit: '+c.n;document.getElementById('en').value=c.n;document.getElementById('ee').value=c.e;document.getElementById('ea').value=c.at;document.getElementById('eb').value=c.b;document.getElementById('es').value=c.s;document.getElementById('er').value=c.r;document.getElementById('em').classList.add('show')}
function closeEm(){document.getElementById('em').classList.remove('show');E=null}
function save(){var c=C.find(x=>x.id==E);if(!c)return;c.n=document.getElementById('en').value;c.e=document.getElementById('ee').value;c.at=document.getElementById('ea').value;c.a=c.at.split(',').length+' ('+c.at+')';c.b=parseFloat(document.getElementById('eb').value)||0;c.s=document.getElementById('es').value;c.r=document.getElementById('er').value;toast('Saved! Balance: $'+c.b.toLocaleString(),'s');closeEm();render()}
function openAdd(){document.getElementById('am').classList.add('show')}
function closeAm(){document.getElementById('am').classList.remove('show')}
function add(){var n=document.getElementById('an').value.trim(),e=document.getElementById('ae').value.trim();if(!n||!e){toast('Name and email required','e');return}var at=document.getElementById('aa').value||'Checking',id=Math.max(...C.map(c=>c.id),0)+1;C.push({id:id,n:n,e:e,a:(at.split(',').length)+' ('+at+')',at:at,b:parseFloat(document.getElementById('ab').value)||0,s:document.getElementById('as').value,r:document.getElementById('ar').value});toast('Created: '+n,'s');closeAm();render()}
function del(id){var c=C.find(x=>x.id==id);if(!c||!confirm('Delete '+c.n+'?'))return;C=C.filter(x=>x.id!=id);toast('Deleted','e');render()}
function toast(m,t){var x=document.getElementById('t');x.textContent=m;x.className='toast toast-'+t+' show';setTimeout(function(){x.classList.remove('show')},3000)}
render();
</script></body></html>
