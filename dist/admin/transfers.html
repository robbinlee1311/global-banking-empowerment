<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Transfers | GBE</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}body{background:#0f172a;color:#e2e8f0;min-height:100vh}
.topbar{background:#1e293b;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155}
.topbar h1{font-size:20px;color:#f8fafc}.topbar .nav{display:flex;gap:24px}.topbar .nav a{color:#94a3b8;text-decoration:none;font-size:14px}.topbar .nav a.active{color:#3b82f6}
.container{max-width:1200px;margin:0 auto;padding:32px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
.stat-card{background:#1e293b;border-radius:12px;padding:24px;border:1px solid #334155}.stat-card .n{font-size:28px;font-weight:700;color:#f8fafc}.stat-card .l{font-size:14px;color:#94a3b8}
.filters{display:flex;gap:10px;margin-bottom:24px}.filters button{padding:8px 16px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#94a3b8;font-size:13px;cursor:pointer}.filters button.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
table{width:100%;border-collapse:collapse;background:#1e293b;border-radius:12px;overflow:hidden;border:1px solid #334155}
th,td{padding:12px 16px;text-align:left;font-size:13px}th{background:#0f172a;color:#94a3b8;font-size:11px;text-transform:uppercase}td{color:#e2e8f0;border-top:1px solid #334155}tr:hover td{background:#1e293b;cursor:pointer}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px}.badge-c{background:rgba(16,185,129,.15);color:#10b981}.badge-p{background:rgba(245,158,11,.15);color:#f59e0b}.badge-f{background:rgba(239,68,68,.15);color:#ef4444}.badge-h{background:rgba(107,114,128,.15);color:#9ca3af}
.btn-sm{padding:6px 12px;border-radius:6px;border:none;font-size:12px;cursor:pointer;color:#fff;margin-right:4px}.btn-g{background:#10b981}.btn-r{background:#ef4444}.btn-h{background:#6b7280}
.detail{background:#1e293b;border-radius:12px;padding:24px;margin-top:24px;border:1px solid #334155;display:none}.detail.show{display:block}
.toast{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:1000;transform:translateX(150%);transition:.3s}.toast.show{transform:translateX(0)}.toast-s{background:#10b981}.toast-e{background:#ef4444}.toast-i{background:#3b82f6}
</style></head><body>
<div class="topbar"><h1>Transfer Monitoring</h1><div class="nav"><a href="dashboard.html">Dashboard</a><a href="approvals.html">Approvals</a><a href="transfers.html" class="active">Transfers</a><a href="customers.html">Customers</a><a href="rules.html">Rules</a></div><div><button class="btn-sm btn-h" onclick="location.href='index.html'">Sign Out</button></div></div>
<div class="container">
<div class="stats"><div class="stat-card"><div class="n" id="tc">7</div><div class="l">Total Today</div></div><div class="stat-card"><div class="n" id="vc">$32,687</div><div class="l">Volume</div></div><div class="stat-card"><div class="n" id="fc">2</div><div class="l">Flagged</div></div><div class="stat-card"><div class="n" id="cc">5</div><div class="l">Completed</div></div></div>
<div class="filters"><button class="active" onclick="fil('all')">All</button><button onclick="fil('completed')">Completed</button><button onclick="fil('pending')">Pending</button><button onclick="fil('flagged')">Flagged</button></div>
<table><thead><tr><th>Date</th><th>Customer</th><th>Description</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead><tbody id="tt"></tbody></table>
<div class="detail" id="dt"><h3 style="color:#f8fafc;margin-bottom:16px">Transfer Details</h3><div id="dc"></div><div id="da" style="margin-top:16px"></div></div></div>
<div class="toast" id="t"></div>
<script>
var D=[{id:'t1',date:'Jul 18, 14:30',customer:'Robbin Lee',desc:'Transfer to Sarah Mitchell',amount:-2500,status:'completed'},{id:'t2',date:'Jul 17, 09:00',customer:'Robbin Lee',desc:'Payroll deposit',amount:8750,status:'completed'},{id:'t3',date:'Jul 15, 11:20',customer:'Robbin Lee',desc:'Amazon purchase',amount:-147.32,status:'completed'},{id:'t4',date:'Jul 14, 16:45',customer:'James Kim',desc:'Transfer to Robbin Lee',amount:-1200,status:'completed'},{id:'t5',date:'Jul 12, 08:15',customer:'Robbin Lee',desc:'Utility bill payment',amount:-89.50,status:'completed'},{id:'t6',date:'Jul 20, 10:30',customer:'Elena Rodriguez',desc:'Large wire to external',amount:-15000,status:'pending'},{id:'t7',date:'Jul 20, 09:15',customer:'James Kim',desc:'International transfer',amount:-5000,status:'flagged'}];
function g(k,d){try{return JSON.parse(localStorage.getItem('gbe_'+k))||d}catch{return d}}
function s(k,v){localStorage.setItem('gbe_'+k,JSON.stringify(v))}
var T=g('tx',D),F='all',S=null;
function render(){var t=0,v=0,f=0,c=0;var fl=F=='all'?T:T.filter(x=>x.status==F);document.getElementById('tt').innerHTML=fl.map(x=>{t++;v+=Math.abs(x.amount);if(x.status=='completed')c++;if(x.status=='flagged')f++;var b=x.status=='completed'?'badge-c':x.status=='pending'?'badge-p':x.status=='flagged'?'badge-f':'badge-h';var ac=x.amount>0?'+':'';var cl=x.amount<0?'#ef4444':'#10b981';var btns='';if(x.status=='pending'||x.status=='flagged')btns='<button class="btn-sm btn-g" onclick="app(\''+x.id+'\')">Approve</button><button class="btn-sm btn-h" onclick="hold(\''+x.id+'\')">Hold</button><button class="btn-sm btn-r" onclick="rej(\''+x.id+'\')">Reject</button>';else if(x.status=='held')btns='<button class="btn-sm btn-g" onclick="app(\''+x.id+'\')">Release</button><button class="btn-sm btn-r" onclick="rej(\''+x.id+'\')">Reject</button>';else btns='<span style="color:#64748b;font-size:12px">No action</span>';return'<tr onclick="sel(\''+x.id+'\')" style="cursor:pointer"><td>'+x.date+'</td><td><b>'+x.customer+'</b></td><td>'+x.desc+'</td><td style="color:'+cl+'">'+ac+'$'+Math.abs(x.amount).toLocaleString()+'</td><td><span class="badge '+b+'">'+x.status+'</span></td><td>'+btns+'</td></tr>'}).join('');document.getElementById('tc').textContent=t;document.getElementById('vc').textContent='$'+v.toLocaleString();document.getElementById('fc').textContent=f;document.getElementById('cc').textContent=c;s('tx',T)}
function fil(st){F=st;document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');render()}
function sel(id){S=T.find(x=>x.id==id);if(!S)return;document.getElementById('dt').classList.add('show');document.getElementById('dc').innerHTML='<p style="color:#94a3b8;font-size:14px"><b>Customer:</b> '+S.customer+'<br><b>Description:</b> '+S.desc+'<br><b>Amount:</b> $'+Math.abs(S.amount).toLocaleString()+'<br><b>Date:</b> '+S.date+'<br><b>Status:</b> '+S.status+'</p>';var btns='';if(S.status=='pending'||S.status=='flagged')btns='<button class="btn-sm btn-g" onclick="app(\''+S.id+'\')">Approve</button><button class="btn-sm btn-h" onclick="hold(\''+S.id+'\')">Hold</button><button class="btn-sm btn-r" onclick="rej(\''+S.id+'\')">Reject</button>';else if(S.status=='held')btns='<button class="btn-sm btn-g" onclick="app(\''+S.id+'\')">Release</button><button class="btn-sm btn-r" onclick="rej(\''+S.id+'\')">Reject</button>';else btns='<span style="color:#64748b">Processed</span>';document.getElementById('da').innerHTML=btns}
function app(id){var x=T.find(y=>y.id==id);if(!x)return;x.status='completed';toast('Approved: '+x.desc,'s');render();if(S&&S.id==id)sel(id)}
function hold(id){var x=T.find(y=>y.id==id);if(!x)return;x.status='held';toast('On hold: '+x.desc,'i');render();if(S&&S.id==id)sel(id)}
function rej(id){var x=T.find(y=>y.id==id);if(!x)return;x.status='rejected';toast('Rejected: '+x.desc,'e');render();if(S&&S.id==id)sel(id)}
function toast(m,c){var x=document.getElementById('t');x.textContent=m;x.className='toast toast-'+c+' show';setTimeout(function(){x.classList.remove('show')},3000)}
render();
</script></body></html>
