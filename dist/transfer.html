<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Move Money | Global Banking Empowerment</title>
    <link rel="stylesheet" href="assets/css/bank.css" />
  </head>
  <body data-role="user">
    <div class="shell">
      <aside class="sidebar">
        <a class="brand" href="dashboard.html"
          ><span class="logo">GBE</span><span>Global Banking Empowerment</span></a
        >
        <nav class="nav">
          <a href="dashboard.html">Dashboard</a><a class="active" href="transfer.html">Move Money</a
          ><a href="cards.html">Cards</a><a href="statements.html">Statements</a
          ><a href="support.html">Support</a><a href="profile.html">Profile</a>
        </nav>
      </aside>
      <main class="main">
        <header class="topbar">
          <strong>Move Money</strong
          ><span
            ><span data-user-name></span>
            <button class="btn outline" type="button" onclick="bank.logout()">
              Sign out
            </button></span
          >
        </header>
        <section class="page grid cols-2">
          <form
            class="card"
            onsubmit="
              event.preventDefault();
              bank.transfer();
            "
          >
            <h1>Send money</h1>
            <div id="notice" class="notice"></div>
            <div class="field">
              <label for="recipient">Recipient</label
              ><input id="recipient" placeholder="Recipient name or account" />
            </div>
            <div class="field">
              <label for="amount">Amount</label
              ><input id="amount" type="number" min="1" step="0.01" placeholder="0.00" />
            </div>
            <div class="field">
              <label for="memo">Memo</label
              ><textarea id="memo" placeholder="Optional note"></textarea>
            </div>
            <button class="btn primary" type="submit">Review and send</button>
          </form>
          <section class="card">
            <h2>Funding account</h2>
            <p>Checking account <strong data-account></strong></p>
            <div class="balance" data-checking></div>
            <p>
              Review recipient details carefully before sending. Additional verification may be
              required to protect your account.
            </p>
          </section>
        </section>
      </main>
    </div>
    <script src="assets/js/user.js"></script>
  </body>
</html>
