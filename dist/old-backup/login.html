<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in | Global Banking Empowerment</title>
  <link rel="stylesheet" href="assets/css/bank.css">
</head>
<body>

  <div id="notice" class="notice">
    <div class="notice-icon"></div>
    <div class="notice-content"><h4></h4><p></p></div>
  </div>

  <div class="auth-page">
    <div class="auth-visual">
      <img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?w=1200&q=80" alt="Banking">
      <div class="auth-visual-content">
        <h2>Welcome back</h2>
        <p>Sign in to access your accounts, manage transfers, and stay on top of your financial life.</p>
      </div>
    </div>
    <div class="auth-form">
      <div class="auth-form-inner">
        <h2>Sign in</h2>
        <p>Enter your credentials to access your account.</p>
        <form onsubmit="return bank.login(this)">
          <div class="form-group">
            <label>Email address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>
          <div class="form-footer">
            <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--color-text-muted);cursor:pointer;">
              <input type="checkbox" style="width:auto;"> Remember me
            </label>
            <a href="#">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:16px;">Sign in</button>
        </form>
        <p style="text-align:center;margin-top:24px;font-size:0.9rem;">
          Don't have an account? <a href="create-account.html" style="color:var(--color-accent-dark);text-decoration:none;font-weight:600;">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <script src="assets/js/user.js"></script>
</body>
</html>
