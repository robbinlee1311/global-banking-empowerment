<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cards | Global Banking Empowerment</title>
    <link rel="stylesheet" href="assets/css/bank.css" />
  </head>
  <body data-role="user">
    <div class="shell">
      <aside class="sidebar">
        <a class="brand" href="dashboard.html"
          ><span class="logo">GBE</span><span>Global Banking Empowerment</span></a
        >
        <nav class="nav">
          <a href="dashboard.html">Dashboard</a><a href="transfer.html">Move Money</a
          ><a class="active" href="cards.html">Cards</a><a href="statements.html">Statements</a
          ><a href="support.html">Support</a><a href="profile.html">Profile</a>
        </nav>
      </aside>
      <main class="main">
        <header class="topbar">
          <strong>Cards</strong
          ><span
            ><span data-user-name></span>
            <button class="btn outline" type="button" onclick="bank.logout()">
              Sign out
            </button></span
          >
        </header>
        <section class="page grid cols-2">
          <article class="card account-card">
            <span>Global Banking Empowerment Visa</span>
            <div class="balance">**** **** **** <span data-card></span></div>
            <small data-user-name></small>
          </article>
          <section class="card">
            <h1>Card controls</h1>
            <div id="notice" class="notice"></div>
            <div class="grid">
              <button
                class="btn secondary"
                type="button"
                onclick="bank.cardAction('Your card has been temporarily locked.')"
              >
                Lock card</button
              ><button
                class="btn secondary"
                type="button"
                onclick="bank.cardAction('Travel notice preferences are ready for review.')"
              >
                Travel notice</button
              ><button
                class="btn secondary"
                type="button"
                onclick="bank.cardAction('Replacement card request has been started.')"
              >
                Replace card</button
              ><button
                class="btn danger"
                type="button"
                onclick="
                  bank.cardAction(
                    'Your card has been marked for urgent review. Contact support for next steps.',
                  )
                "
              >
                Report lost or stolen
              </button>
            </div>
          </section>
        </section>
      </main>
    </div>
    <script src="assets/js/user.js"></script>
  </body>
</html>
