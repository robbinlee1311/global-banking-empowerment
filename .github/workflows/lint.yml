name: Lint

on:
  push:
    branches-ignore:
      - "dependabot/**"
  pull_request:
  workflow_dispatch:

env:
  FORCE_COLOR: 2
  NODE: 22

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Debug checkout
        run: |
          echo "===== COMMIT ====="
          git rev-parse HEAD

          echo "===== STATUS ====="
          git status

          echo "===== FILE LENGTHS ====="
          wc -l src/scss/_app-sidebar.scss
          wc -l src/scss/_compact-mode.scss

          echo "===== LAST 10 LINES OF _app-sidebar.scss ====="
          tail -n 10 src/scss/_app-sidebar.scss

          echo "===== LAST 10 LINES OF _compact-mode.scss ====="
          tail -n 10 src/scss/_compact-mode.scss

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "${{ env.NODE }}"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Show lint versions
        run: |
          echo "===== STYLELINT VERSION ====="
          npx stylelint --version

          echo "===== NODE ====="
          node --version

          echo "===== NPM ====="
          npm --version

          echo "===== PACKAGE TREE ====="
          npm ls stylelint || true
          npm ls stylelint-config-twbs-bootstrap || true
          npm ls @stylistic/stylelint-plugin || true

      - name: Run Stylelint diagnostics
        run: |
          echo "===== REMOVE STYLELINT CACHE ====="
          rm -rf .cache

          echo "===== RUN STYLELINT WITHOUT CACHE ====="
          npx stylelint "src/scss/**/*.scss" --formatter verbose --no-cache

      - name: Run CSS lint
        run: |
          echo "===== REMOVE STYLELINT CACHE AGAIN ====="
          rm -rf .cache

          echo "===== RUN CSS LINT WITHOUT CACHE ====="
          npx stylelint "src/scss/**/*.scss" --rd --no-cache

      - name: Run full lint
        run: |
          npm run lockfile-lint
          npm run docs-lint
          npm run js-lint