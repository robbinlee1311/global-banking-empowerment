name: Lint

on:
  push:
    branches-ignore:
      - "dependabot/**"
  pull_request:
  workflow_dispatch:

env:
  FORCE_COLOR: 2
  NODE: 22

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Verify GitHub checkout
        run: |
          echo "===== COMMIT ====="
          git rev-parse HEAD

          echo "===== STATUS ====="
          git status

          echo "===== APP SIDEBAR LINE 615-630 ====="
          nl -ba src/scss/_app-sidebar.scss | sed -n '615,630p'

          echo "===== COMPACT MODE LINE 45-60 ====="
          nl -ba src/scss/_compact-mode.scss | sed -n '45,60p'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE }}"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Show lint versions
        run: |
          echo "===== STYLELINT VERSION ====="
          npx stylelint --version

          echo "===== NODE ====="
          node --version

          echo "===== NPM ====="
          npm --version

          echo "===== PACKAGE TREE ====="
          npm ls stylelint || true
          npm ls stylelint-config-twbs-bootstrap || true
          npm ls @stylistic/stylelint-plugin || true

      - name: Run Stylelint
        run: |
          echo "===== REMOVE CACHE ====="
          rm -rf .cache

          echo "===== RUN STYLELINT ====="
          npx stylelint "src/scss/**/*.scss" --formatter verbose --no-cache

      - name: Run full lint
        run: |
          npm run lockfile-lint
          npm run docs-lint
          npm run js-lint