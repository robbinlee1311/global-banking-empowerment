<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Login | GBE</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}body{background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border-radius:16px;padding:48px;width:400px;max-width:90%;border:1px solid #334155;text-align:center}
.card .logo{font-size:32px;margin-bottom:8px}.card h1{font-size:24px;color:#f8fafc;margin-bottom:8px}.card p{color:#94a3b8;font-size:14px;margin-bottom:32px}
.input{margin-bottom:20px;text-align:left}.input label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.input input{width:100%;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f8fafc;font-size:14px}
.btn{width:100%;padding:14px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:12px}.btn:hover{background:#2563eb}.btn-g{background:#10b981}.btn-g:hover{background:#059669}
.hint{background:#0f172a;border-radius:8px;padding:16px;margin-top:20px;border:1px solid #334155;text-align:left}
.hint h4{font-size:13px;color:#f8fafc;margin-bottom:8px}.hint p{font-size:12px;color:#64748b;line-height:1.6}
.toast{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:1000;transform:translateX(150%);transition:.3s}.toast.show{transform:translateX(0)}.toast-s{background:#10b981}.toast-e{background:#ef4444}
</style></head><body>
<div class="card"><div class="logo">🏦</div><h1>Admin Portal</h1><p>Global Banking Empowerment</p><div class="input"><label>Admin Email</label><input type="email" id="e" value="admin@globalbanking.com"></div><div class="input"><label>Password</label><input type="password" id="p" value="admin123"></div><button class="btn" onclick="login()">Sign In</button><button class="btn btn-g" onclick="demo()">🚀 Demo Login</button><div class="hint"><h4>👤 Demo Credentials</h4><p>Email: <b>admin@globalbanking.com</b><br>Password: <b>admin123</b></p></div></div>
<div class="toast" id="t"></div>
<script>
function toast(m,c){var x=document.getElementById('t');x.textContent=m;x.className='toast toast-'+c+' show';setTimeout(function(){x.classList.remove('show')},3000)}
function login(){var e=document.getElementById('e').value,p=document.getElementById('p').value;if(e=='admin@globalbanking.com'&&p=='admin123'){localStorage.setItem('gbe_session',JSON.stringify({user:'Robbin Lee'}));toast('Welcome!','s');setTimeout(function(){location.href='dashboard.html'},800)}else{toast('Invalid credentials','e')}}
function demo(){localStorage.setItem('gbe_session',JSON.stringify({user:'Robbin Lee'}));toast('Demo mode!','s');setTimeout(function(){location.href='dashboard.html'},800)}
if(localStorage.getItem('gbe_session'))location.href='dashboard.html';
</script></body></html>
