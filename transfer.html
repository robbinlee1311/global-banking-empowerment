<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Send Money | Global Banking Empowerment</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="top-nav">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="transfer.html" class="active">Send Money</a>
    <a href="transactions.html">Transactions</a>
    <a href="profile.html">Profile</a>
  </nav>

  <main class="container">
    <h1>Send Money</h1>

    <form id="transfer-form">
      <section class="form-section">
        <h2>Recipient</h2>
        <label for="recipient">Recipient name or account</label>
        <input type="text" id="recipient" name="recipient" placeholder="Enter recipient name or account number" required>

        <label for="amount">Amount</label>
        <input type="number" id="amount" name="amount" placeholder="0.00" min="0.01" step="0.01" required>
      </section>

      <section class="form-section">
        <h2>Note (optional)</h2>
        <label for="note">Note</label>
        <input type="text" id="note" name="note" placeholder="Add a note for your records">
      </section>

      <section class="form-section">
        <h2>From account</h2>
        <select id="from-account" name="from-account" required>
          <option value="checking">Checking account</option>
          <option value="savings">Savings account</option>
        </select>
      </section>

      <button type="submit" class="btn-primary">Review and send</button>
    </form>
  </main>

  <script src="app.js"></script>
</body>
</html>
